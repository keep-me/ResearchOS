name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/**"
      - ".env.example"
      - "Dockerfile*"
      - "apps/**"
      - "constraints.txt"
      - "docker-compose*.yml"
      - "packages/**"
      - "infra/**"
      - "tests/**"
      - "frontend/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "frontend/package.json"
      - "frontend/package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".env.example"
      - "Dockerfile*"
      - "apps/**"
      - "constraints.txt"
      - "docker-compose*.yml"
      - "packages/**"
      - "infra/**"
      - "tests/**"
      - "frontend/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "frontend/package.json"
      - "frontend/package-lock.json"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -e ".[dev,llm,pdf]"
      - name: Test backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: frontend
        run: npm run test:unit
      - name: Build
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=2048
        run: npm run build

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend audit
        working-directory: frontend
        run: npm audit --audit-level=moderate --registry=https://registry.npmjs.org
      - name: Python audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt pip-audit
          python -m pip install -c constraints.txt -e ".[llm,pdf]"
          pip-audit
