name: ARIS Smoke

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "docs/aris-parity-implementation-plan.md"
      - "pyproject.toml"
      - "package.json"
      - ".github/workflows/aris-smoke.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "docs/aris-parity-implementation-plan.md"
      - "pyproject.toml"
      - "package.json"
      - ".github/workflows/aris-smoke.yml"

jobs:
  aris-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm,pdf]"

      - name: Run ARIS smoke checks
        shell: pwsh
        run: |
          pwsh -NoLogo -File scripts/run-aris-smoke.ps1
